<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background gradient: USWDS navy to deep blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b2744"/>
      <stop offset="100%" style="stop-color:#112e51"/>
    </linearGradient>
    <!-- Accent panel gradient -->
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005ea2;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#005ea2;stop-opacity:0.04"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="0.4" stroke-opacity="0.06"/>
    </pattern>
    <!-- Glow filter for title -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- Grid overlay -->
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Right decorative panel (abstract window/card) -->
  <rect x="720" y="60" width="500" height="520" rx="16" fill="url(#panel)" stroke="#005ea2" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Decorative circles (soft glow orbs) -->
  <circle cx="960" cy="320" r="220" fill="#005ea2" fill-opacity="0.06"/>
  <circle cx="1100" cy="160" r="120" fill="#7ed3f7" fill-opacity="0.04"/>
  <circle cx="820" cy="520" r="100" fill="#005ea2" fill-opacity="0.08"/>

  <!-- Mock browser chrome in right panel -->
  <rect x="752" y="100" width="436" height="300" rx="10" fill="#1a3a5c" stroke="#1e4976" stroke-width="1.5"/>
  <!-- Browser top bar -->
  <rect x="752" y="100" width="436" height="36" rx="10" fill="#1e4976"/>
  <rect x="752" y="118" width="436" height="18" fill="#1e4976"/>
  <!-- Traffic lights -->
  <circle cx="775" cy="118" r="6" fill="#ff5f57" fill-opacity="0.8"/>
  <circle cx="797" cy="118" r="6" fill="#febc2e" fill-opacity="0.8"/>
  <circle cx="819" cy="118" r="6" fill="#28c840" fill-opacity="0.8"/>
  <!-- URL bar -->
  <rect x="840" y="109" width="200" height="18" rx="4" fill="#0b2744" fill-opacity="0.6"/>
  <text x="854" y="122" font-family="monospace" font-size="11" fill="#a9c9e8" fill-opacity="0.8">agency.gov</text>

  <!-- Mock USA Banner inside browser -->
  <rect x="752" y="136" width="436" height="22" fill="#112e51"/>
  <rect x="762" y="141" width="12" height="12" fill="none"/>
  <!-- Tiny flag stripes -->
  <rect x="762" y="142" width="12" height="2" fill="#B22234"/>
  <rect x="762" y="145" width="12" height="2" fill="#ffffff"/>
  <rect x="762" y="148" width="12" height="2" fill="#B22234"/>
  <text x="778" y="152" font-family="Arial, sans-serif" font-size="10" fill="#a9c9e8">An official website of the United States government</text>

  <!-- Mock nav bar -->
  <rect x="752" y="158" width="436" height="36" fill="#162d4c"/>
  <text x="768" y="181" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#ffffff">Agency Name</text>
  <text x="900" y="181" font-family="Arial, sans-serif" font-size="12" fill="#a9c9e8">Services</text>
  <text x="962" y="181" font-family="Arial, sans-serif" font-size="12" fill="#a9c9e8">Apply</text>
  <text x="1012" y="181" font-family="Arial, sans-serif" font-size="12" fill="#a9c9e8">Help</text>
  <text x="1054" y="181" font-family="Arial, sans-serif" font-size="12" fill="#a9c9e8">Contact</text>
  <!-- Active indicator -->
  <rect x="896" y="191" width="50" height="3" rx="1.5" fill="#005ea2"/>

  <!-- Mock hero section -->
  <rect x="752" y="194" width="436" height="80" fill="#162d4c"/>
  <rect x="768" y="208" width="160" height="14" rx="3" fill="#005ea2" fill-opacity="0.6"/>
  <rect x="768" y="228" width="240" height="10" rx="3" fill="#ffffff" fill-opacity="0.12"/>
  <rect x="768" y="244" width="200" height="10" rx="3" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="768" y="260" width="80" height="20" rx="4" fill="#005ea2" fill-opacity="0.8"/>

  <!-- Mock card row -->
  <rect x="752" y="278" width="136" height="100" rx="6" fill="#0f2640" stroke="#1e4976" stroke-width="1"/>
  <rect x="762" y="288" width="80" height="8" rx="2" fill="#005ea2" fill-opacity="0.5"/>
  <rect x="762" y="302" width="110" height="6" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="762" y="313" width="95" height="6" rx="2" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="762" y="326" width="55" height="16" rx="3" fill="#005ea2" fill-opacity="0.6"/>
  <rect x="898" y="278" width="136" height="100" rx="6" fill="#0f2640" stroke="#1e4976" stroke-width="1"/>
  <rect x="908" y="288" width="80" height="8" rx="2" fill="#005ea2" fill-opacity="0.5"/>
  <rect x="908" y="302" width="110" height="6" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="908" y="313" width="95" height="6" rx="2" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="908" y="326" width="55" height="16" rx="3" fill="#005ea2" fill-opacity="0.6"/>
  <rect x="1044" y="278" width="136" height="100" rx="6" fill="#0f2640" stroke="#1e4976" stroke-width="1"/>
  <rect x="1054" y="288" width="80" height="8" rx="2" fill="#005ea2" fill-opacity="0.5"/>
  <rect x="1054" y="302" width="110" height="6" rx="2" fill="#ffffff" fill-opacity="0.1"/>
  <rect x="1054" y="313" width="95" height="6" rx="2" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="1054" y="326" width="55" height="16" rx="3" fill="#005ea2" fill-opacity="0.6"/>

  <!-- Mock footer -->
  <rect x="752" y="382" width="436" height="58" rx="0" fill="#0b2030"/>
  <rect x="762" y="395" width="60" height="8" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="762" y="410" width="100" height="6" rx="2" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="762" y="421" width="80" height="6" rx="2" fill="#ffffff" fill-opacity="0.06"/>
  <rect x="1000" y="395" width="40" height="8" rx="2" fill="#ffffff" fill-opacity="0.15"/>
  <rect x="1000" y="410" width="60" height="6" rx="2" fill="#ffffff" fill-opacity="0.08"/>
  <!-- Bottom identifier bar -->
  <rect x="752" y="440" width="436" height="20" rx="0" fill="#162d4c"/>
  <rect x="762" y="447" width="200" height="6" rx="2" fill="#ffffff" fill-opacity="0.1"/>

  <!-- ===== LEFT CONTENT ===== -->

  <!-- .gov badge -->
  <rect x="60" y="68" width="82" height="28" rx="5" fill="#005ea2" fill-opacity="0.25" stroke="#005ea2" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Small flag -->
  <rect x="72" y="76" width="14" height="12" rx="1" fill="none"/>
  <rect x="72" y="77" width="14" height="3" fill="#B22234"/>
  <rect x="72" y="80" width="14" height="3" fill="#ffffff"/>
  <rect x="72" y="83" width="14" height="3" fill="#B22234"/>
  <rect x="72" y="77" width="6" height="6" fill="#3C3B6E"/>
  <text x="90" y="87" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#7ec8f7" letter-spacing="0.5">.gov</text>

  <!-- Main title -->
  <text x="60" y="188" font-family="'Courier New', monospace" font-weight="700" font-size="68" fill="#ffffff" letter-spacing="-1" filter="url(#shadow)">astro-gov-</text>
  <text x="60" y="268" font-family="'Courier New', monospace" font-weight="700" font-size="68" fill="#ffffff" letter-spacing="-1" filter="url(#shadow)">starter</text>

  <!-- Underline accent -->
  <rect x="60" y="282" width="340" height="4" rx="2" fill="#005ea2"/>
  <rect x="60" y="282" width="90" height="4" rx="2" fill="#fa9441"/>

  <!-- Tagline -->
  <text x="60" y="330" font-family="Arial, sans-serif" font-size="22" fill="#a9c9e8" letter-spacing="0.2">Accessible government websites,</text>
  <text x="60" y="358" font-family="Arial, sans-serif" font-size="22" fill="#a9c9e8" letter-spacing="0.2">ready to ship.</text>

  <!-- Tech badges -->
  <!-- Astro badge -->
  <rect x="60" y="398" width="104" height="34" rx="17" fill="#fa9441" fill-opacity="0.15" stroke="#fa9441" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- Astro "rocket" symbol approximation -->
  <polygon points="73,411 80,403 87,411 84,418 76,418" fill="#fa9441" fill-opacity="0.8"/>
  <text x="92" y="420" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#fa9441">Astro</text>

  <!-- USWDS badge -->
  <rect x="174" y="398" width="114" height="34" rx="17" fill="#005ea2" fill-opacity="0.2" stroke="#7ec8f7" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="189" y="420" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#7ec8f7">⭐ USWDS</text>

  <!-- Tailwind badge -->
  <rect x="298" y="398" width="130" height="34" rx="17" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="313" y="420" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#38bdf8">Tailwind CSS</text>

  <!-- i18n badge -->
  <rect x="438" y="398" width="90" height="34" rx="17" fill="#28c840" fill-opacity="0.15" stroke="#28c840" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="453" y="420" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#69e07a">EN / ES</text>

  <!-- Feature bullets -->
  <circle cx="70" cy="480" r="3" fill="#005ea2"/>
  <text x="84" y="485" font-family="Arial, sans-serif" font-size="16" fill="#7a9cbf">WCAG 2.1 AA  ·  Static output  ·  GitHub Pages deploy</text>

  <circle cx="70" cy="514" r="3" fill="#005ea2"/>
  <text x="84" y="519" font-family="Arial, sans-serif" font-size="16" fill="#7a9cbf">HTML validation  ·  axe-core  ·  Lighthouse CI</text>

  <!-- Bottom attribution / github -->
  <text x="60" y="576" font-family="'Courier New', monospace" font-size="15" fill="#3d6b8a" letter-spacing="0.3">github.com/ctrimm/astro-gov-starter</text>

  <!-- Top right corner accent line -->
  <line x1="1280" y1="0" x2="1280" y2="0" stroke="#005ea2" stroke-width="6"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="1280" height="5" fill="#005ea2" fill-opacity="0.7"/>
  <!-- Accent bar bottom -->
  <rect x="0" y="635" width="1280" height="5" fill="#005ea2" fill-opacity="0.5"/>
</svg>
