name: Bug report
description: Something in the starter template is broken or behaves incorrectly.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below
        so we can reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Template version / commit
      description: Paste the git SHA or release tag you are using.
      placeholder: e.g. v1.2.0 or abc1234
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `pnpm dev`
        2. Navigate to /services/
        3. See error in console
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Build / CI
        - USWDS components
        - Accessibility
        - i18n / Spanish locale
        - Content collections
        - Layouts / pages
        - USWDS assets (fonts, images, JS)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, OS, browser (if applicable).
      placeholder: |
        Node: 22.x
        OS: macOS 14 / Ubuntu 22.04
        Browser: Chrome 124
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else that might help.
